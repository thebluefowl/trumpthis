  <line x1="50" y1="32" x2="50" y2="72" stroke="#1e2030" stroke-width="0.5"/>

  <!-- Missile trajectory arc -->
  <path d="M35 60 Q50 30 65 45" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="65" cy="45" r="2" fill="#dc2626" opacity="0.9"/>

  <!-- Crosshair at center -->
  <circle cx="50" cy="52" r="6" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="44" x2="50" y2="48" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="56" x2="50" y2="60" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="52" x2="46" y2="52" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
  <line x1="54" y1="52" x2="58" y2="52" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="38" cy="28" r="1.2" fill="#e0e4ef" opacity="0.7"/>
  <circle cx="50" cy="24" r="1.2" fill="#e0e4ef" opacity="0.7"/>
  <circle cx="62" cy="28" r="1.2" fill="#e0e4ef" opacity="0.7"/>

