  <ellipse cx="50" cy="52" rx="12" ry="20" fill="none" stroke="#1e2030" stroke-width="0.5"/>
  <ellipse cx="50" cy="52" rx="20" ry="8" fill="none" stroke="#1e2030" stroke-width="0.5"/>
